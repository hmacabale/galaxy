name: Deploy Glue Job

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DATA_BUCKET: bpigalaxy-data
      GLUE_BUCKET: bpigalaxy-glue-assets
      GLUE_JOB_NAME: sample-glue-job
      AWS_REGION: ap-southeast-1

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::762233726348:role/bpidev-ocid-github-role
          aws-region: ap-southeast-1

      # ✅ Step 1: Ensure DATA bucket exists
      - name: Check/Create DATA bucket
        run: |
          if aws s3api head-bucket --bucket $DATA_BUCKET 2>/dev/null; then
            echo "DATA bucket exists"
          else
            echo "Creating DATA bucket..."
            aws s3api create-bucket \
              --bucket $DATA_BUCKET \
              --region $AWS_REGION \
              --create-bucket-configuration LocationConstraint=$AWS_REGION
          fi

      # ✅ Step 2: Ensure GLUE bucket exists
      - name: Check/Create GLUE bucket
        run: |
          if aws s3api head-bucket --bucket $GLUE_BUCKET 2>/dev/null; then
            echo "GLUE bucket exists"
          else
            echo "Creating GLUE bucket..."
            aws s3api create-bucket \
              --bucket $GLUE_BUCKET \
              --region $AWS_REGION \
              --create-bucket-configuration LocationConstraint=$AWS_REGION
          fi

      # ✅ Step 3: Upload Glue script
      - name: Upload Glue script
        run: |
          aws s3 cp glue/scripts/ \
          s3://$GLUE_BUCKET/scripts/ \
          --recursive

      # ✅ Step 4: Upload sample CSV
      - name: Upload sample CSV
        run: |
          aws s3 cp glue/data/ \
          s3://$DATA_BUCKET/raw/ \
          --recursive

      # ✅ Step 5: Create or Update Glue Job
      - name: Create or Update Glue Job
        run: |
          JOB_EXISTS=$(aws glue get-job --job-name $GLUE_JOB_NAME --query 'Job.Name' --output text 2>/dev/null || echo "NOT_FOUND")

          if [ "$JOB_EXISTS" == "$GLUE_JOB_NAME" ]; then
            echo "Updating Glue job..."
            aws glue update-job \
              --job-name $GLUE_JOB_NAME \
              --job-update '{
                "Role": "AWSGlueServiceRole",
                "Command": {
                  "Name": "glueetl",
                  "ScriptLocation": "s3://'$GLUE_BUCKET'/scripts/sample_glue_job.py",
                  "PythonVersion": "3"
                },
                "DefaultArguments": {
                  "--INPUT_PATH": "s3://'$DATA_BUCKET'/raw/",
                  "--OUTPUT_PATH": "s3://'$DATA_BUCKET'/processed/"
                },
                "GlueVersion": "4.0",
                "WorkerType": "G.1X",
                "NumberOfWorkers": 2
              }'
          else
            echo "Creating Glue job..."
            aws glue create-job \
              --name $GLUE_JOB_NAME \
              --role AWSGlueServiceRole \
              --command Name=glueetl,ScriptLocation=s3://$GLUE_BUCKET/scripts/sample_glue_job.py,PythonVersion=3 \
              --default-arguments '{
                "--INPUT_PATH": "s3://'$DATA_BUCKET'/raw/",
                "--OUTPUT_PATH": "s3://'$DATA_BUCKET'/processed/"
              }' \
              --glue-version "4.0" \
              --worker-type G.1X \
              --number-of-workers 2
          fi
